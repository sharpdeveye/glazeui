name: ✨ Feature Request
description: Suggest an enhancement or new feature for GlazeUI
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your feature suggestion! Please describe your idea in detail.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of GlazeUI does this relate to?
      options:
        - Component Behavior
        - Design Tokens / Theming
        - UX Guidelines
        - Documentation
        - CLI Tool
        - Accessibility
        - Figma Kit
        - Build Pipeline
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots about the feature request.
